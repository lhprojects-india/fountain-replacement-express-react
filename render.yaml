services:
  - type: web
    name: lh-onboarding-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npx prisma generate --schema=apps/backend/prisma/schema.prisma
    startCommand: npm run start -w backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: DROPBOX_SIGN_API_KEY
        sync: false
      - key: DROPBOX_SIGN_CLIENT_ID
        sync: false
      - key: DROPBOX_SIGN_WEBHOOK_SECRET
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@laundryheap.com
      - key: API_BASE_URL
        value: https://lh-onboarding-backend.onrender.com
      - key: DRIVER_WEB_URL
        value: https://lh-driver-web.onrender.com
      - key: ADMIN_WEB_URL
        value: https://lh-admin-web.onrender.com
      - key: LOG_LEVEL
        value: info

  - type: web
    name: lh-driver-web
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build -w driver-web
    staticPublishPath: apps/driver-web/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://lh-onboarding-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: lh-admin-web
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build -w admin-web
    staticPublishPath: apps/admin-web/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://lh-onboarding-backend.onrender.com/api
      - key: VITE_DRIVER_APP_URL
        value: https://lh-driver-web.onrender.com
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
