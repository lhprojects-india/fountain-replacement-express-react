<div class="fixed inset-0 admin-hero-gradient z-0 overflow-hidden">

</div>
<!-- Main Content Shell (Contextual FAB Suppression Applied - No Nav Shell for Transactional Login) -->
<main class="relative z-10 w-full max-w-[400px] px-4">
<!-- Login Card: Layer 2 (The Interactive) -->
<div class="bg-surface-container-lowest rounded-xl cloud-shadow p-10 flex flex-col items-center">
<!-- Branding Area -->
<div class="mb-8 flex flex-col items-center">
<div class="mb-6 h-12 w-auto">
<img alt="Laundryheap Logo" class="h-full object-contain" data-alt="Clean minimalist logo for Laundryheap with bold blue typography on a crisp white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBINBCnz7B9mW2xj0o-FxhLfDgijAMjxetGjNp_8yaFd6vd1czdvuRTQPdGB_uANNS53tuimf3g8_u8iR0mQML04ffbxObEtgb4jSQ6AXUbwC1QlhDWLexPbk1iUm4FOgwMndwpZolCA8rFUPbossv_GB4FHvEcszEhnbSybP1pKuKLVGzsK_dZANM8mwZLWyDi319b-lker3Ezgt-OIEA5Xmzi7ugJ_K-Z-YHEccn1yYNA9NVSChMn407k2uJgcUfEhwZjOl4YX2v0"/>

<p class="text-on-surface-variant text-sm text-center leading-relaxed">Sign in to manage driver applications</p>
</div>
<!-- Primary Action: Continue with Google -->
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg text-on-surface font-medium hover:bg-surface-container-low transition-colors duration-150 mb-6">

<span>Continue with Google</span>
</button>
<!-- Divider (The Ghost Border Fallback Rule) -->
<div class="w-full flex items-center gap-4 mb-6">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-outline text-xs font-label uppercase tracking-widest">or</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Secondary Email/Password (De-emphasized) -->
<form class="w-full space-y-4">
<div class="space-y-1.5">
<label class="text-xs font-label font-semibold text-on-surface-variant tracking-wider uppercase ml-1">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-secondary/30 transition-all text-on-surface placeholder:text-outline/60 text-sm" placeholder="name@laundryheap.com" type="email"/>
</div>
<div class="space-y-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-label font-semibold text-on-surface-variant tracking-wider uppercase">Password</label>
<a class="text-xs text-primary font-medium hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-secondary/30 transition-all text-on-surface placeholder:text-outline/60 text-sm" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Blue Button (The Primary Engine) -->
<button class="w-full h-12 mt-4 bg-primary text-on-primary font-semibold rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 w-full">
<p class="text-[10px] text-center text-on-surface-variant/60 font-label uppercase tracking-widest">
                    Laundryheap internal use only.
                </p>
</div>
</div>
<!-- External Help Link -->
<div class="mt-6 text-center">
<p class="text-white/70 text-xs">
                Need help accessing your account? 
                <a class="text-secondary-fixed-dim font-semibold hover:text-white transition-colors" href="#">Contact IT Support</a>
</p>
